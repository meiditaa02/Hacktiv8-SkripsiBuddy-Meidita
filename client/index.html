<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skripsi Buddy</title>
  <link rel="icon" type="image/png" href="logo.png"v=2 />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">

    <div class="card">

      <header class="tab">
        <img class="tab__mark" src="logo.png" alt="Logo Skripsi Buddy" />
        <div class="tab__text">
          <h1>Skripsi Buddy</h1>
          <p>Teman skripsimu, kapan pun dibutuhkan.</p>
        </div>
        <div class="tab__status">
          <span class="dot"></span> Online
        </div>
      </header>

      <main class="notebook">
        <div id="chat-box" class="chat-box">
          <div class="message bot">
            Halo! Aku Skripsi Buddy 👋🎓 <br>
            Ceritain aja kendalamu, nanti kita cari jalan keluarnya bareng. Kamu mau mulai dari mana hari ini?
          </div>
        </div>

        <form id="chat-form" class="composer">
          <input
            id="user-input"
            type="text"
            placeholder="Tulis pertanyaan atau curhatanmu..."
            autocomplete="off"
            required
          />
          <button type="submit" aria-label="Kirim pesan">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 12L21 3L14 21L11 13L3 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
            </svg>
          </button>
        </form>
      </main>

      <div class="binder-holes" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
